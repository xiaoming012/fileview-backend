# ===========================================
# 文件预览服务配置 - 生产环境
# ===========================================
# 说明：生产环境使用 /opt/fileview 目录规划

# 服务基础配置
server:
  port: 8184
  servlet:
    context-path: 
    encoding:
      charset: UTF-8
      enabled: true
      force: false

# Spring应用配置
spring:
  application:
    name: fileview-preview

  # Redis配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 
      timeout: 10000ms
      database: 0
      lettuce:
        pool:
          max-active: 20       # 2C4G: 默认连接池大小
          max-idle: 10         # 2C4G: 默认空闲连接
          min-idle: 5          # 2C4G: 最小空闲连接
          max-wait: -1ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
    deserialization:
      read-date-timestamps-as-nanoseconds: false

mq:
  engine: ${MQ_ENGINE:redis} # 优先使用环境变量 MQ_ENGINE，未设置时默认 redis

# RocketMQ配置
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: preview-producer-group
    send-message-timeout: 30000
    retry-times-when-send-failed: 3
    retry-times-when-send-async-failed: 3
    max-message-size: 4194304
    access-channel: LOCAL
  consumer:
    group: preview-consumer-group
    consume-timeout: 30000
    consume-thread-min: 5      # 2C4G: 最小消费线程数
    consume-thread-max: 20      # 2C4G: 最大消费线程数

# 文件预览配置
fileview:
  # 文件存储服务配置
  storage:
    type: local
    local:
      base-path: d:/myWorkSpace/fileview-backend/fileTemp
      path-mapping:
        enabled: false
        from: /opt/fileview/logs/preview
        to: d:/myWorkSpace/fileview-backend
    remote:
      server-url: http://file-server:8080
      access-key: 
      secret-key:
      timeout: 30000
    oss:
      provider: aliyun
      access-key: 
      secret-key: 
      bucket: fileview-storage
      endpoint: oss-cn-hangzhou.aliyuncs.com
      url-expiration-hours: 1
      
  preview:
    url:
      base-url: http://127.0.0.1:8184
      expiration-hours: 240
      
    cache:
      enabled: true
      default-ttl-hours: 240
      max-cache-size: 1000      # 2C4G: 默认缓存大小
      # 转换结果缓存TTL（秒）
      conversion:
        success-ttl: 864000  # 转换成功缓存时间：240小时
        failed-ttl: 60       # 转换失败缓存时间：60秒
      # 直接预览缓存TTL（秒）
      direct-preview-ttl: 864000  # 直接预览缓存时间：240小时
      
    polling:
      default-timeout: 60          # 默认超时时间（秒）- 从 20 增加到 60，解决转换超时问题
      max-timeout: 120             # 最大超时时间（秒）- 从 300 减少到 120，避免过长等待
      default-interval: 1000       # 默认检查间隔（毫秒）
      min-interval: 500            # 最小检查间隔（毫秒）
      max-interval: 5000           # 最大检查间隔（毫秒）
      smart-strategy:
        phase1-attempts: 20        # 第一阶段尝试次数（从 10 增加到 20，保持总时长不变）
        phase1-interval: 500       # 第一阶段间隔（毫秒）- 从 1000 减少到 500，提升响应速度 50%
        phase2-attempts: 20        # 第二阶段尝试次数（2秒间隔）
        phase2-interval: 2000      # 第二阶段间隔（毫秒）
        phase3-interval: 5000      # 第三阶段间隔（毫秒）
      # 长轮询专用线程池配置（生产环境：高并发优化）
      thread-pool:
        core-pool-size: 100        # 核心线程数（从 50 增加到 100，提升并发能力）
        max-pool-size: 300         # 最大线程数（从 200 增加到 300，峰值支持更高并发）
        queue-capacity: 500        # 队列容量（超过300个并发时排队）
        keep-alive-seconds: 60     # 空闲线程存活时间（秒）
        thread-name-prefix: long-polling-  # 线程名称前缀
      # 随机Jitter配置（消除羊群效应）
      jitter:
        enabled: true              # 是否启用Jitter
        min-factor: 0.9            # 最小因子（从 0.8 增加到 0.9，减少波动）
        max-factor: 1.1            # 最大因子（从 1.2 减少到 1.1，提升稳定性）
      
    storage:
      preview-dir: /opt/fileview/data/preview
      temp-dir: /opt/fileview/data/temps
      upload-dir: /opt/fileview/data/uploads
      download-dir: /opt/fileview/data/downloads
      uncompress-dir: /opt/fileview/data/uncompress
      max-file-size-mb: 100   
    
    security:
      password:
        ttlSeconds: 1800
        crypto:
          secret: preview-default-secret-key-change-in-production
  
  network:
    download:
      connect-timeout: 5000
      read-timeout: 120000
      max-retry: 5
      retry-base-delay: 500
      buffer-size: 131072       # 2C4G: 128KB，默认下载缓冲区
    security:
      trusted-sites: 
      untrusted-sites:
